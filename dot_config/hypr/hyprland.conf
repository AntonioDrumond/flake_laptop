
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# autogenerated = 1 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,1920x1080,0x0,1.5,


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar & hyprpaper & hypridle
exec-once=xrandr --output eDP-1 --primary
exec-once = otd-daemon


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = GDK_BACKEND, wayland, x11


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 6

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    # col.active_border = rgba(33c0ffee) rgba(3206c4ee) 45deg
    col.active_border = rgba(33c0ffee) rgba(4214d9ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    allow_tearing = false

    layout = dwindle
    # layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 9
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.95

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true 
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section belowla
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
source = ~/.config/hypr/layout.conf
input {
    # kb_model =
    # kb_options =
    # kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod ctrl, t, exec, $terminal
bind = $mainMod, x, killactive,
bind = $mainMod shift, M, exit,
bind = $mainMod, E, exec, kitty --execute yazi
bind = $mainMod shift, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, f, fullscreen
bind = $mainMod shift, L, exec, systemctl suspend
bind = $mainMod ctrl, L, exec, hyprlock
bind = $mainMod shift, O, exec, /home/antonio/.local/bin/obiLaunch
bind = $mainMod shift, PRINT, exec, hyprshot -m region --clipboard-only --silent
bind = $mainMod ctrl shift, PRINT, exec, hyprshot -m region --silent
bind = $mainMod ctrl, left, workspace, e-1
bind = $mainMod ctrl, right, workspace, e+1
bind = ctrl shift, ESCAPE, exec, kitty --execute btop
bind = ctrl $mainMod, P, exec, layout_pt
bind = ctrl $mainMod, O, exec, layout_en

# Hide waybar or not
# bind = $mainMod, B, exec, /home/antonio/.config/waybar/autohide.sh
# bind = $mainMod shift, B, exec, /home/antonio/.config/waybar/launch.sh
bind = $mainMod, B, exec, /home/antonio/.local/bin/autohide_wd --name .waybar-wrapped
bind = $mainMod shift, B, exec, waybar 
bind = $mainMod ctrl, B, exec, /home/antonio/.config/waybar/noWaybar.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod ctrl, 1, workspace, 11
bind = $mainMod ctrl, 2, workspace, 12
bind = $mainMod ctrl, 3, workspace, 13
bind = $mainMod ctrl, 4, workspace, 14
bind = $mainMod ctrl, 5, workspace, 15
bind = $mainMod ctrl, 6, workspace, 16
bind = $mainMod ctrl, 7, workspace, 17
bind = $mainMod ctrl, 8, workspace, 18
bind = $mainMod ctrl, 9, workspace, 19
bind = $mainMod ctrl, 0, workspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod ctrl SHIFT, 1, movetoworkspace, 11
bind = $mainMod ctrl SHIFT, 2, movetoworkspace, 12
bind = $mainMod ctrl SHIFT, 3, movetoworkspace, 13
bind = $mainMod ctrl SHIFT, 4, movetoworkspace, 14
bind = $mainMod ctrl SHIFT, 5, movetoworkspace, 15
bind = $mainMod ctrl SHIFT, 6, movetoworkspace, 16
bind = $mainMod ctrl SHIFT, 7, movetoworkspace, 17
bind = $mainMod ctrl SHIFT, 8, movetoworkspace, 18
bind = $mainMod ctrl SHIFT, 9, movetoworkspace, 19
bind = $mainMod ctrl SHIFT, 0, movetoworkspace, 20

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod CTRL, mouse:272, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$


# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on,match:class ^$,match:title ^$,match:xwayland 1,match:float 1,match:fullscreen 0,match:pin 0

xwayland {
    create_abstract_socket = true
    force_zero_scaling = true
}


############################
## Set waybar windowrules ##
############################

# Bluetooth
windowrule = float on, match:class blueman-manager
windowrule = animation slide top, match:class blueman-manager
windowrule = move 51% 10%, match:class blueman-manager
windowrule = min_size 500 200, match:class blueman-manager
windowrule = max_size 500 200, match:class blueman-manager

# Calendar
windowrule = float on, match:class cal
windowrule = move center, match:class cal
# windowrule = move 41% 6%, match:class cal
windowrule = min_size 225 220, match:class cal
windowrule = max_size 225 220, match:class cal
windowrule = animation slide, match:class cal
windowrule = stay_focused on, match:class cal

# Network 
windowrule = float on, match:class nm-connection-editor
windowrule = animation slide top, match:class nm-connection-editor
windowrule = move 49% 10%, match:class nm-connection-editor
windowrule = min_size 500 400, match:class nm-connection-editor
windowrule = max_size 500 400, match:class nm-connection-editor

windowrule = float on, match:class nmtui
windowrule = min_size 800 500, match:class nmtui
windowrule = max_size 800 500, match:class nmtui
windowrule = animation slide top, match:class nmtui

# Audio
windowrule = float on, match:class org.pulseaudio.pavucontrol
windowrule = animation slide top, match:class org.pulseaudio.pavucontrol
windowrule = move 55% 10%, match:class org.pulseaudio.pavucontrol
windowrule = min_size 450 400, match:class org.pulseaudio.pavucontrol
windowrule = max_size 450 400, match:class org.pulseaudio.pavucontrol

# Performance
windowrule = float on, match:class btop
windowrule = fullscreen on, match:class btop
windowrule = maximize on, match:class btop
windowrule = border_size 0, match:class btop
windowrule = animation popin, match:class btop

# Battery
windowrule = float on, match:class auto-cpufreq
windowrule = fullscreen on, match:class auto-cpufreq
windowrule = maximize on, match:class auto-cpufreq
windowrule = border_size 0, match:class auto-cpufreq
windowrule = animation popin, match:class auto-cpufreq
